name: CI

on:
  # bd-e9884a: gate CI off main-branch pushes. CI now runs on release tag
  # pushes and on pull requests (operator decision: keep pre-merge PR CI as a
  # gate), plus manual dispatch. Direct reintegration / the merge queue is the
  # gate for work landing on main.
  push:
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    name: JS tests + docs check
    # bd-37d130: routed to the azure-ephemeral self-hosted runner pool per
    # operator directive (2026-06-28) to move CI compute onto dedicated
    # ephemeral x86 runners.
    runs-on: [self-hosted, azure-ephemeral]
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run JS test suite
        run: npm test
      - name: Validate generated docs
        run: npm run check

  rust:
    name: Rust tests + clippy
    runs-on: [self-hosted, azure-ephemeral]
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        # edition 2024 requires rust >= 1.85 (see Cargo.toml rust-version).
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Run Rust tests
        run: cargo test --workspace

  audit:
    name: Dependency audit (cargo audit)
    runs-on: [self-hosted, azure-ephemeral]
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        # Prebuilt binary install keeps this job fast and predictable.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Audit dependencies for security advisories
        run: cargo audit
