name: CI

on:
  # bd-e9884a: gate CI off main-branch pushes. CI now runs on release tag
  # pushes and on pull requests (operator decision: keep pre-merge PR CI as a
  # gate), plus manual dispatch. Direct reintegration / the merge queue is the
  # gate for work landing on main.
  push:
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    name: JS tests + docs check
    # bd-37d130: routed to the azure-ephemeral self-hosted runner pool per
    # operator directive (2026-06-28) to move CI compute onto dedicated
    # ephemeral x86 runners.
    runs-on: [self-hosted, azure-ephemeral]
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      # bd-7eb473: toolchains come from the flake devShell (the azure-ephemeral
      # runners have Nix but no system node/rust/cc), so each step runs under
      # `nix develop --command` instead of actions/setup-node.
      - name: Run JS test suite
        run: nix develop --command npm test
      - name: Validate generated docs
        run: nix develop --command npm run check

  rust:
    name: Rust tests + clippy
    runs-on: [self-hosted, azure-ephemeral]
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      # bd-7eb473: cargo/rustc/clippy/rustfmt + cc all come from the flake
      # devShell (stdenv provides cc, fixing "linker `cc` not found" on the
      # toolchain-less azure-ephemeral runners), so cargo runs under
      # `nix develop --command`.
      - name: Check formatting
        run: nix develop --command cargo fmt --all -- --check
      - name: Clippy (deny warnings)
        run: nix develop --command cargo clippy --workspace --all-targets -- -D warnings
      - name: Run Rust tests
        run: nix develop --command cargo test --workspace

  audit:
    name: Dependency audit (cargo audit)
    runs-on: [self-hosted, azure-ephemeral]
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      # bd-7eb473: cargo + cargo-audit come from the flake devShell.
      - name: Audit dependencies for security advisories
        # If a future advisory on an unrelated dep proves noisy, this step can
        # be made advisory with `continue-on-error: true`.
        run: nix develop --command cargo audit
