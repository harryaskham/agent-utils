name: CI

on:
  # bd-e9884a: gate CI off main-branch pushes. CI now runs on release tag
  # pushes and on pull requests (operator decision: keep pre-merge PR CI as a
  # gate), plus manual dispatch. Direct reintegration / the merge queue is the
  # gate for work landing on main.
  push:
    tags:
      - "v*"
  pull_request:
  # merge-queue prerequisite: GitHub's merge queue runs required checks on the
  # queued merge commit via merge_group events. Without this trigger, queued PRs
  # hang forever waiting for checks that never run. Inert until a merge_queue
  # ruleset is enabled on main (the ruleset's required_status_checks reference
  # these same five job names: JS, Rust, audit, Nix flake check, pi-wasm).
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    name: JS tests + docs check
    # bd-37d130: routed to the azure-ephemeral self-hosted runner pool per
    # operator directive (2026-06-28) to move CI compute onto dedicated
    # ephemeral x86 runners.
    runs-on: [self-hosted, azure-ephemeral]
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run JS test suite
        run: npm test
      - name: Validate generated docs
        run: npm run check

  pi-wasm:
    name: pi-wasm typecheck + tests
    # The pi-wasm subproject (epic bd-f76cee) is a self-contained Node/Vite
    # browser build with its own vitest suite + tsc typecheck that the root
    # `npm test` (node --test) does NOT cover (bd-91362a). This job gates it so
    # a broken pi-wasm test, type error, or dep change cannot land silently.
    runs-on: [self-hosted, azure-ephemeral]
    timeout-minutes: 10
    defaults:
      run:
        working-directory: pi-wasm
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install pi-wasm dependencies
        run: npm ci
      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck
      - name: Run vitest suite
        run: npm run test
      - name: Browser bundle build
        run: npm run build

  rust:
    name: Rust tests + clippy
    runs-on: [self-hosted, azure-ephemeral]
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        # edition 2024 requires rust >= 1.85 (see Cargo.toml rust-version).
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      # bd-77f340: azure-ephemeral runners have no system C compiler; provide
      # just gcc via nix-shell -p gcc (lightweight, not the 5GB devShell) so
      # cargo can link. rustup cargo stays; only cc comes from nix.
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy (deny warnings)
        run: nix-shell -p gcc --run "cargo clippy --workspace --all-targets -- -D warnings"
      - name: Run Rust tests
        run: nix-shell -p gcc --run "cargo test --workspace"

  audit:
    name: Dependency audit (cargo audit)
    runs-on: [self-hosted, azure-ephemeral]
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        # Prebuilt binary install keeps this job fast and predictable.
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Audit dependencies for security advisories
        run: cargo audit

  flake:
    name: Nix flake check
    # Cheap eval-only baseline gate (operator suggestion 2026-06-29): catches
    # flake.nix breakage (malformed outputs, eval errors, broken references)
    # that the JS/Rust/audit jobs do not. --no-build keeps it fast: it
    # instantiates the current system's flake outputs without building them.
    # Drop --no-build if a future operator wants full build validation.
    runs-on: [self-hosted, azure-ephemeral]
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Nix flake check (eval-only)
        run: nix --extra-experimental-features 'nix-command flakes' flake check --no-build
