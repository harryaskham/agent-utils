<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>pi-wasm — in-browser Pi agent (S11 sessions)</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        font: 14px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace;
        margin: 0; height: 100vh; display: flex; flex-direction: column;
        background: #0b0f14; color: #d7e0ea;
      }
      header { padding: 0.7rem 1rem; border-bottom: 1px solid #1b2530; }
      .titlebar { display: flex; align-items: center; gap: 0.75rem; }
      header h1 { font-size: 0.95rem; margin: 0; font-weight: 600; }
      header p { margin: 0.15rem 0 0; font-size: 0.72rem; color: #7c8a9a; }
      #settings-toggle {
        font: inherit; font-size: 0.8rem; padding: 0.2rem 0.6rem; border-radius: 6px; cursor: pointer;
        background: #12181f; color: #d7e0ea; border: 1px solid #1b2530;
      }
      #status { margin-left: auto; font-size: 0.75rem; padding: 0.15rem 0.5rem; border-radius: 999px; }
      #status.is-live { color: #4cd964; background: #10241a; }
      #status.is-mock { color: #d9a54c; background: #241d10; }
      #settings-panel { margin-top: 0.6rem; padding: 0.75rem; background: #0d131a; border: 1px solid #1b2530; border-radius: 8px; }
      .pi-wasm-settings { display: flex; flex-direction: column; gap: 0.5rem; font-size: 0.82rem; }
      .pi-wasm-settings .notice { margin: 0 0 0.25rem; color: #7c8a9a; font-size: 0.75rem; }
      .pi-wasm-settings label { display: flex; flex-direction: column; gap: 0.2rem; color: #6f8296; }
      .pi-wasm-settings input, .pi-wasm-settings textarea {
        font: inherit; font-size: 0.8rem; padding: 0.3rem 0.4rem; border-radius: 5px;
        background: #0b0f14; color: #d7e0ea; border: 1px solid #1b2530; width: 100%;
      }
      .pi-wasm-settings .actions { display: flex; gap: 0.5rem; align-items: center; }
      .pi-wasm-settings button {
        font: inherit; font-size: 0.8rem; padding: 0.3rem 0.8rem; border-radius: 6px; cursor: pointer;
        background: #1f6feb; color: #fff; border: none;
      }
      .pi-wasm-settings button[data-act="reset"], .pi-wasm-settings button[data-act="clear"] {
        background: #12181f; color: #d7e0ea; border: 1px solid #1b2530;
      }
      .pi-wasm-settings .errors { color: #ff8a8a; font-size: 0.75rem; }
      .pi-wasm-settings .status { color: #7c8a9a; font-size: 0.75rem; }
      #app { flex: 1; min-height: 0; display: flex; flex-direction: column; padding: 1rem; }
      .workspace { flex: 1; min-height: 0; display: flex; }
      #sessions { flex: 0 0 210px; min-width: 0; overflow-y: auto; background: #0a0e13; border-right: 1px solid #1b2530; }
      @media (max-width: 640px) { #sessions { flex-basis: 150px; } }
      .pi-sessions { display: flex; flex-direction: column; height: 100%; }
      .pi-sessions__head { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 0.7rem; border-bottom: 1px solid #1b2530; }
      .pi-sessions__title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: #6f8296; }
      .pi-sessions__new { font: inherit; font-size: 0.72rem; padding: 0.15rem 0.45rem; border-radius: 5px; cursor: pointer; background: #1f6feb; color: #fff; border: none; }
      .pi-sessions__list { list-style: none; margin: 0; padding: 0.3rem; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.2rem; }
      .pi-sessions__item { padding: 0.35rem 0.45rem; border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
      .pi-sessions__item:hover { background: #0f1620; }
      .pi-sessions__item.is-active { background: #12202e; border-color: #1f4d6b; }
      .pi-sessions__row { display: flex; align-items: baseline; justify-content: space-between; gap: 0.4rem; }
      .pi-sessions__name { font-size: 0.8rem; color: #d7e0ea; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .pi-sessions__time { font-size: 0.66rem; color: #5c6b7a; flex: 0 0 auto; }
      .pi-sessions__actions { display: flex; gap: 0.15rem; margin-top: 0.2rem; opacity: 0; transition: opacity 0.1s; }
      .pi-sessions__item:hover .pi-sessions__actions, .pi-sessions__item.is-active .pi-sessions__actions { opacity: 1; }
      .pi-sessions__actions button { font: inherit; font-size: 0.7rem; padding: 0 0.3rem; border-radius: 4px; cursor: pointer; background: #12181f; color: #8595a6; border: 1px solid #1b2530; }
      .pi-sessions__actions button:hover { color: #d7e0ea; }
      .pi-sessions__foot { padding: 0.5rem 0.7rem; border-top: 1px solid #1b2530; }
      .pi-sessions__backend-row { display: flex; align-items: center; gap: 0.3rem; margin-top: 0.3rem; }
      .pi-sessions__backend-label { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.05em; color: #6f8296; }
      .pi-sessions__backend { flex: 1; font: inherit; font-size: 0.7rem; padding: 0.1rem 0.2rem; border-radius: 4px; background: #0b0f14; color: #d7e0ea; border: 1px solid #1b2530; }
      .pi-sessions__import { font: inherit; font-size: 0.72rem; padding: 0.2rem 0.5rem; border-radius: 5px; cursor: pointer; background: #12181f; color: #d7e0ea; border: 1px solid #1b2530; width: 100%; }
      .pi-chat { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 0.75rem; }
      .pi-chat__log {
        flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 0.4rem;
        padding: 0.5rem; background: #0d131a; border: 1px solid #1b2530; border-radius: 8px;
      }
      .pi-chat__empty { color: #5c6b7a; padding: 1rem; text-align: center; }
      .pi-chat__msg { display: flex; gap: 0.6rem; padding: 0.4rem 0.5rem; border-radius: 6px; }
      .pi-chat__msg--user { background: #10202e; }
      .pi-chat__msg--assistant { background: #12181f; }
      .pi-chat__msg--tool-call { background: #16130a; color: #d9c07c; font-size: 0.85em; }
      .pi-chat__msg--tool-result { background: #0e1712; color: #9fd4b0; font-size: 0.85em; }
      .pi-chat__msg--tool-error { background: #2a1114; color: #ff8a8a; font-size: 0.85em; }
      .pi-chat__msg--error { background: #2a1114; color: #ff8a8a; }
      .pi-chat__role {
        flex: 0 0 5.5rem; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.05em;
        color: #6f8296; padding-top: 0.1rem;
      }
      .pi-chat__msg--user .pi-chat__role { color: #4c9dd9; }
      .pi-chat__msg--assistant .pi-chat__role { color: #4cd964; }
      .pi-chat__text { white-space: pre-wrap; word-break: break-word; flex: 1; }
      .is-streaming .pi-chat__text { color: #a9e5b6; }
      .pi-chat__composer { display: flex; gap: 0.5rem; }
      .pi-chat__input {
        flex: 1; resize: vertical; font: inherit; padding: 0.5rem; border-radius: 6px;
        background: #0d131a; color: #d7e0ea; border: 1px solid #1b2530;
      }
      .pi-chat__send {
        font: inherit; padding: 0 1.1rem; border-radius: 6px; cursor: pointer;
        background: #1f6feb; color: #fff; border: none;
      }
      .pi-chat__send:disabled { opacity: 0.5; cursor: default; }
    </style>
  </head>
  <body>
    <header>
      <div class="titlebar">
        <h1>pi-wasm — fully in-browser Pi agent loop</h1>
        <button id="settings-toggle" type="button" aria-expanded="false" aria-controls="settings-panel">⚙ Settings</button>
        <span id="status"></span>
      </div>
      <p>S11 keyed multi-session shell (bd-0dc0bc) on the S7 loop · epic bd-f76cee · Path A (zero node polyfills):
         many named agent sessions, each with its own transcript + VFS workdir, all persisted in-browser (IndexedDB).</p>
      <div id="settings-panel" hidden></div>
    </header>
    <main class="workspace">
      <aside id="sessions"></aside>
      <section id="app"></section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
